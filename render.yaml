services:
  - type: web
    name: ebay-message-monitor-backend
    runtime: node
    rootDir: ebay-monitor/backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_POOL_MAX
        value: "10"
      - key: STORE_WRITE_INTERVAL_MS
        value: "15000"
