<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>eBay Monitor</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0a0a0a;
        color: #f5f5f5;
      }
      body {
        width: 330px;
        margin: 0;
        padding: 16px;
        background: #0a0a0a;
      }
      .panel {
        border: 1px solid #2a2a2a;
        border-radius: 8px;
        background: #111;
        padding: 14px;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }
      .label {
        color: #a3a3a3;
        font-size: 12px;
      }
      .value {
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .field {
        margin-bottom: 12px;
      }
      .dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: #ef4444;
      }
      .dot.connected {
        background: #22c55e;
      }
      input,
      button {
        width: 100%;
        box-sizing: border-box;
        border-radius: 6px;
        border: 1px solid #2a2a2a;
        background: #0f0f0f;
        color: #f5f5f5;
        padding: 9px 10px;
        font: inherit;
      }
      button {
        cursor: pointer;
        background: #3b82f6;
        border-color: #3b82f6;
        font-weight: 700;
        margin-top: 10px;
      }
      button.secondary {
        background: #181818;
        border-color: #2a2a2a;
      }
      .hint {
        margin-top: 6px;
        color: #a3a3a3;
        font-size: 11px;
        line-height: 1.4;
      }
      .hint.error {
        color: #fca5a5;
      }
      .diag {
        margin-top: 10px;
        border-top: 1px solid #2a2a2a;
        padding-top: 10px;
        color: #a3a3a3;
        font-size: 12px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <div class="row">
        <div>
          <div class="label">Store</div>
          <div class="value" id="storeName">Loading...</div>
        </div>
        <span class="dot" id="statusDot"></span>
      </div>
      <div class="field">
        <label class="label" for="storeNameInput">Store name</label>
        <input id="storeNameInput" placeholder="Example: Store 1 / Main eBay" />
        <div class="hint" id="storeHint">This name appears in the dashboard.</div>
        <button id="saveStoreName" class="secondary">Save store name</button>
      </div>
      <div class="row">
        <div>
          <div class="label">Unread detected</div>
          <div class="value" id="unreadCount">0</div>
        </div>
        <div>
          <div class="label">Connection</div>
          <div class="value" id="statusText">Disconnected</div>
        </div>
      </div>
      <label class="label" for="wsUrl">WebSocket URL</label>
      <input id="wsUrl" value="wss://ebay-message-monitor-backend.onrender.com" />
      <div class="hint" id="wsHint">Use the WebSocket backend URL, not your eBay inbox link.</div>
      <button id="saveWs" class="secondary">Save URL</button>
      <button id="resetWs" class="secondary">Reset to localhost</button>
      <button id="scanPage" class="secondary">Scan this eBay tab</button>
      <button id="openDashboard">Open Dashboard</button>
      <div class="diag" id="diag">Scanner: waiting for eBay page</div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
